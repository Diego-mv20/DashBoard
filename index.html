<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>DashBoard</title>
</head>
<body>
    <div class="Container">
        <aside class="sidebar">
            <h2>Menu</h2>

            <ul>
                <li>Inicio</li>
                <li>Ventas</li>
                <li>Usuarios</li>
            </ul>
        </aside>

        <main class="main">
           <header class="header">
            <button id="toggle">+</button>
            <h1>Panel</h1>

            <section class="cards">
                <div class="cards">Card 1</div>
                <div class="cards">Card 2</div>
                <div class="cards">Card 3</div>
            </section>
           </header> 
        </main>
    </div>
</body>
</html>
